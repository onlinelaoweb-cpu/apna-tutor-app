<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apna Tutor — CBSE Home Companion</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1B3358">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apna Tutor">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F7FA;
    --bg-alt: #FFFFFF;
    --ink: #1B2A41;
    --ink-soft: #5B6B85;
    --navy: #1B3358;
    --navy-soft: #2C4874;
    --gold: #E8A33D;
    --maroon: #B23A48;
    --green-ok: #3F8F5F;
    --line: #DDE3EC;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; min-height: 100vh; }
  .sidebar-backdrop { display: none; }
  .menu-btn {
    display: none;
    width: 34px; height: 34px; border-radius: 8px;
    align-items: center; justify-content: center;
    background: var(--bg-alt); border: 1px solid var(--line);
    cursor: pointer; font-size: 18px; flex-shrink: 0;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--navy);
    color: #fff;
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .brand {
    font-family: 'Roboto Slab', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .brand span { color: var(--gold); }
  .brand-sub { font-size: 12px; color: #A9B7CE; margin-top: 2px; }
  .install-btn {
    background: var(--gold); color: #2B1B05; border: none;
    padding: 8px 12px; border-radius: 8px; font-weight: 700; font-size: 12.5px;
    cursor: pointer; margin-top: 8px; width: fit-content;
  }

  .profiles { display: flex; flex-direction: column; gap: 8px; }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8DA0C0;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .profile-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.04);
    transition: background 0.15s ease;
  }
  .profile-meta { flex: 1; }
  .profile-remove {
    flex-shrink: 0;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: #8DA0C0;
    font-size: 15px;
    line-height: 1;
    opacity: 0.6;
  }
  .profile-remove:hover { background: rgba(255,255,255,0.15); color: #fff; opacity: 1; }
  .profile-chip:hover { background: rgba(255,255,255,0.09); }
  .profile-chip.active {
    background: rgba(232,163,61,0.16);
    border-color: var(--gold);
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 12px;
    color: #fff; flex-shrink: 0;
  }
  .profile-meta { line-height: 1.25; }
  .profile-name { font-size: 13.5px; font-weight: 600; }
  .profile-grade { font-size: 11.5px; color: #A9B7CE; }

  .btn-ghost {
    background: transparent;
    border: 1px dashed #4E668E;
    color: #C7D3E6;
    padding: 9px 10px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }
  .btn-ghost:hover { border-color: var(--gold); color: #fff; }

  .add-form {
    background: rgba(255,255,255,0.05);
    padding: 12px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .add-form input, .add-form select {
    padding: 8px 9px;
    border-radius: 7px;
    border: 1px solid #4E668E;
    background: #142440;
    color: #fff;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
  }
  .add-form input::placeholder { color: #7C8DAC; }
  .add-form button {
    background: var(--gold);
    border: none;
    color: #24170A;
    font-weight: 700;
    padding: 8px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
  }

  .setup-block { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .setup-block select {
    width: 100%;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid #4E668E;
    background: #142440;
    color: #fff;
    font-size: 13px;
  }
  .subject-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .subject-chip {
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    color: #fff;
    opacity: 0.75;
  }
  .subject-chip.active { opacity: 1; border-color: #fff; }
  .topic-input {
    width: 100%;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid #4E668E;
    background: #142440;
    color: #fff;
    font-size: 13px;
  }
  .topic-hint { font-size: 11px; color: #8DA0C0; line-height: 1.4; }

  /* ---------- Main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    background: var(--bg-alt);
  }
  .topbar h1 {
    font-family: 'Roboto Slab', serif;
    font-size: 18px;
    margin: 0;
  }
  .topbar .context { font-size: 13px; color: var(--ink-soft); }

  .tabs { display: flex; gap: 6px; padding: 14px 28px 0; background: var(--bg-alt); border-bottom: 1px solid var(--line); }
  .tab {
    padding: 9px 16px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .tab.active { color: var(--navy); border-color: var(--gold); }

  .panel { flex: 1; padding: 24px 28px; overflow-y: auto; }
  .empty-state {
    max-width: 420px;
    margin: 60px auto;
    text-align: center;
    color: var(--ink-soft);
  }
  .empty-state h2 { font-family: 'Roboto Slab', serif; color: var(--navy); font-size: 20px; }

  /* Chat */
  .chat-window {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    margin: 0 auto 90px;
  }
  .msg { display: flex; gap: 10px; }
  .msg.user { flex-direction: row-reverse; }
  .bubble {
    padding: 11px 14px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.55;
    max-width: 480px;
    min-height: 20px;
    white-space: pre-wrap;
  }
  .msg.assistant .bubble { background: var(--bg-alt); border: 1px solid var(--line); }
  .msg.user .bubble { background: var(--navy); color: #fff; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .chat-input-bar {
    position: sticky; bottom: 0;
    max-width: 720px; margin: 0 auto;
    display: flex; gap: 8px;
    background: var(--bg);
    padding-top: 8px;
  }
  .chat-input-bar textarea {
    flex: 1; resize: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 44px; max-height: 120px;
  }
  .send-btn {
    background: var(--navy); color: #fff; border: none;
    padding: 0 18px; border-radius: 10px; font-weight: 600; cursor: pointer;
  }
  .send-btn:disabled { opacity: 0.5; cursor: default; }
  .icon-btn {
    background: var(--bg-alt); border: 1px solid var(--line);
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
  .icon-btn.listening { background: var(--maroon); border-color: var(--maroon); animation: pulseMic 1s infinite; }
  @keyframes pulseMic { 0%,100% { box-shadow: 0 0 0 0 rgba(178,58,72,0.5); } 50% { box-shadow: 0 0 0 8px rgba(178,58,72,0); } }
  .speak-btn {
    background: none; border: none; cursor: pointer;
    font-size: 13px; color: var(--ink-soft); margin-top: 6px; padding: 0;
  }
  .speak-btn:hover { color: var(--navy); }
  .image-preview-chip {
    max-width: 720px; margin: 0 auto 6px;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-alt); border: 1px solid var(--line);
    border-radius: 10px; padding: 6px 10px; font-size: 12.5px; color: var(--ink-soft);
  }
  .image-preview-chip img { width: 34px; height: 34px; object-fit: cover; border-radius: 6px; }
  .image-preview-chip .remove-chip { margin-left: auto; cursor: pointer; color: var(--maroon); font-weight: 700; }
  .msg-image { max-width: 220px; border-radius: 10px; margin-top: 6px; display: block; }

  /* Talking teacher avatar */
  .teacher-wrap { text-align: center; margin: 10px 0 20px; }
  .avatar-teacher {
    width: 84px; height: 84px; border-radius: 50%;
    margin: 0 auto; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    transition: transform 0.2s ease;
  }
  .avatar-teacher.talking { transform: scale(1.04); }
  .avatar-eyes { display: flex; gap: 16px; }
  .avatar-eye { width: 9px; height: 9px; border-radius: 50%; background: #1B2A41; animation: avatarBlink 4.5s infinite; }
  .avatar-mouth { width: 24px; height: 5px; background: #1B2A41; border-radius: 4px; margin-top: 12px; transition: all 0.12s ease; }
  .avatar-teacher.talking .avatar-mouth { animation: avatarTalk 0.32s infinite ease-in-out; }
  @keyframes avatarTalk { 0%,100% { height: 5px; width: 24px; border-radius: 4px; } 50% { height: 14px; width: 17px; border-radius: 50%; } }
  @keyframes avatarBlink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.15); } }
  .teacher-name { font-size: 12.5px; color: var(--ink-soft); margin-top: 8px; font-weight: 600; }
  .lang-toggle { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
  .lang-btn {
    padding: 6px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 600;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink-soft); cursor: pointer;
  }
  .lang-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }
  .autospeak-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-soft); cursor: pointer;
    margin-top: 6px;
  }
  .autospeak-toggle input { cursor: pointer; }

  /* Quiz */
  .quiz-shell { max-width: 620px; margin: 0 auto; }
  .quiz-start-btn {
    background: var(--gold); color: #2B1B05; border: none;
    padding: 11px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px;
  }
  .q-card {
    background: var(--bg-alt); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px;
  }
  .q-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .q-text { font-size: 15px; font-weight: 600; margin: 4px 0 10px; }
  .option {
    display: block; width: 100%; text-align: left;
    padding: 9px 12px; margin-bottom: 6px;
    border: 1.5px solid var(--line); border-radius: 8px;
    background: #fff; cursor: pointer; font-size: 13.5px;
  }
  .option.selected { border-color: var(--navy); background: #EEF2F8; }
  .option.correct { border-color: var(--green-ok); background: #EAF7EF; }
  .option.wrong { border-color: var(--maroon); background: #FBEAEC; }
  .explain { font-size: 12.5px; color: var(--ink-soft); margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line); }

  /* Stamp */
  .stamp-wrap { display: flex; justify-content: center; margin: 26px 0; }
  .stamp {
    width: 150px; height: 150px; border-radius: 50%;
    border: 4px double var(--maroon);
    color: var(--maroon);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transform: rotate(-8deg);
    font-family: 'IBM Plex Mono', monospace;
    animation: stampIn 0.35s ease-out;
  }
  @keyframes stampIn {
    0% { transform: rotate(-8deg) scale(1.6); opacity: 0; }
    100% { transform: rotate(-8deg) scale(1); opacity: 1; }
  }
  .stamp .score { font-size: 28px; font-weight: 700; }
  .stamp .label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  /* Progress */
  .progress-list { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
  .progress-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--bg-alt); border: 1px solid var(--line); border-radius: 10px;
  }
  .p-subject-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .p-info { flex: 1; }
  .p-topic { font-size: 13.5px; font-weight: 600; }
  .p-meta { font-size: 11.5px; color: var(--ink-soft); }
  .p-score { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px; }
  .p-score.good { color: var(--green-ok); }
  .p-score.mid { color: var(--gold); }
  .p-score.low { color: var(--maroon); }

  .loading-dots::after { content: '...'; animation: dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #C7D0DD; border-radius: 4px; }

  /* ---------- Mobile ---------- */
  @media (max-width: 820px) {
    .menu-btn { display: flex; }

    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 82vw;
      max-width: 320px;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,0.25);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-backdrop.open {
      display: block;
      position: fixed; inset: 0;
      background: rgba(10,16,28,0.45);
      z-index: 45;
    }

    .main { width: 100%; }

    .topbar { padding: 12px 14px; gap: 10px; }
    .topbar h1 { font-size: 15.5px; }
    .topbar .context { font-size: 11.5px; }

    .tabs { padding: 8px 10px 0; gap: 2px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { padding: 8px 10px; font-size: 12.5px; white-space: nowrap; }

    .panel { padding: 14px; }

    .chat-window { max-width: 100%; gap: 10px; margin-bottom: 76px; }
    .bubble { max-width: 78vw; font-size: 14px; }
    .chat-input-bar { max-width: 100%; flex-wrap: nowrap; }
    .chat-input-bar textarea { font-size: 16px; } /* 16px avoids iOS auto-zoom on focus */
    .icon-btn { width: 40px; height: 40px; font-size: 16px; }
    .send-btn { padding: 0 12px; font-size: 13px; }

    .msg-image { max-width: 60vw; }

    .avatar-teacher { width: 68px; height: 68px; }

    .quiz-shell { max-width: 100%; }
    .q-card { padding: 13px 14px; }
    .stamp { width: 120px; height: 120px; }
    .stamp .score { font-size: 22px; }

    .progress-list { max-width: 100%; }
    .progress-row { padding: 9px 12px; flex-wrap: wrap; }

    .lang-toggle { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
const SUBJECT_COLORS = {
  "Mathematics": "#E0793C", "Science": "#3B6EA5", "Physics": "#3B6EA5",
  "Chemistry": "#4C9F70", "Biology": "#7C5CBF", "English": "#C2536B",
  "Hindi": "#B23A48", "Social Science": "#8A6D3B", "EVS": "#4C9F70",
  "Economics": "#8A6D3B", "Accountancy": "#3B6EA5", "Business Studies": "#E0793C",
  "History": "#8A6D3B", "Political Science": "#7C5CBF", "Geography": "#4C9F70",
  "Sanskrit": "#B23A48", "ICT": "#2E9C9C",
  "Alphabets": "#C2536B", "Numbers": "#E0793C", "Rhymes & Stories": "#7C5CBF",
  "Colors & Shapes": "#4C9F70", "My World": "#3B6EA5"
};
function subjColor(s){ return SUBJECT_COLORS[s] || "#5B6B85"; }

const EARLY_YEARS = ["Nursery","LKG","UKG"];
function isEarlyYears(grade){ return EARLY_YEARS.includes(grade); }

function subjectsForGrade(grade, stream){
  if (isEarlyYears(grade)) return ["Alphabets","Numbers","Rhymes & Stories","Colors & Shapes","My World"];
  const g = parseInt(grade,10);
  if (g <= 5) return ["Mathematics","English","Hindi","EVS","ICT"];
  if (g <= 8) return ["Mathematics","Science","English","Hindi","Social Science","ICT"];
  if (g <= 10) return ["Mathematics","Science","English","Social Science","Hindi","ICT"];
  // 11-12, stream based
  if (stream === "Commerce") return ["Accountancy","Business Studies","Economics","English","Mathematics"];
  if (stream === "Humanities") return ["History","Political Science","Geography","Economics","English"];
  return ["Physics","Chemistry","Mathematics","Biology","English"]; // Science default
}

let state = {
  profiles: [],
  activeId: null,
  activeSubject: null,
  topic: "",
  activeTab: "tutor",
  chat: [],           // {role, text, image?} in-memory per session
  chatLoading: false,
  quiz: null,         // {questions:[...]}
  quizAnswers: {},
  quizLoading: false,
  quizSubmitted: false,
  progress: {},       // profileId -> [{subject, topic, score, total, date}]
  listening: false,
  pendingImage: null,  // {mediaType, data, previewUrl}
  talking: false,
  autoSpeak: null,     // null = use age-based default; true/false = explicit user choice
  canInstall: false,
  sidebarOpen: false,
  ttsLang: 'en'         // 'en' or 'hi' - controls both the tutor's reply language and voice
};

function shouldAutoSpeak(profile){
  return state.autoSpeak !== null ? state.autoSpeak : isEarlyYears(profile.grade);
}

// Voices load asynchronously in most browsers - cache them once available.
let cachedVoices = [];
function primeVoices(){
  if (!('speechSynthesis' in window)) return;
  cachedVoices = window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => { cachedVoices = window.speechSynthesis.getVoices(); };
}

function pickVoice(lang){
  const voices = cachedVoices.length ? cachedVoices : (('speechSynthesis' in window) ? window.speechSynthesis.getVoices() : []);
  if (!voices.length) return null;
  const prefix = lang === 'hi' ? 'hi' : 'en';
  let candidates = voices.filter(v => v.lang.toLowerCase().startsWith(prefix));
  if (!candidates.length) candidates = voices.filter(v => v.lang.toLowerCase().startsWith('en'));
  if (!candidates.length) return voices[0];
  // Prefer voices that tend to sound more natural (not a guarantee - depends on the device/OS).
  const scored = candidates.map(v => {
    let score = 0;
    if (/natural|neural|premium|enhanced|wavenet/i.test(v.name)) score += 5;
    if (/google/i.test(v.name)) score += 3;
    if (lang === 'en' && /india|hindi/i.test(v.name + ' ' + v.lang)) score += 1;
    if (v.localService === false) score += 1;
    return { v, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored[0].v;
}

function speak(text, callbacks){
  callbacks = callbacks || {};
  if (!('speechSynthesis' in window) || !text){
    if (callbacks.onDone) callbacks.onDone();
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const voice = pickVoice(state.ttsLang);
  if (voice) utter.voice = voice;
  utter.lang = voice ? voice.lang : (state.ttsLang === 'hi' ? 'hi-IN' : 'en-IN');
  utter.rate = 0.96;
  utter.pitch = 1.02;

  let sawBoundary = false;
  const fallbackTimer = setTimeout(() => {
    // Some browsers (notably iOS Safari) never fire boundary events - reveal the
    // full caption immediately so the text isn't stuck blank while audio plays.
    if (!sawBoundary && callbacks.onWord) callbacks.onWord(text.length);
  }, 900);

  utter.onstart = ()=>{ state.talking = true; updateAvatarClass(); };
  utter.onboundary = (e)=>{
    sawBoundary = true;
    clearTimeout(fallbackTimer);
    if (callbacks.onWord && (e.name === 'word' || e.name === undefined)) {
      const nextSpace = text.indexOf(' ', e.charIndex + 1);
      callbacks.onWord(nextSpace === -1 ? text.length : nextSpace);
    }
  };
  utter.onend = ()=>{
    clearTimeout(fallbackTimer);
    state.talking = false; updateAvatarClass();
    if (callbacks.onDone) callbacks.onDone();
  };
  utter.onerror = ()=>{
    clearTimeout(fallbackTimer);
    state.talking = false; updateAvatarClass();
    if (callbacks.onDone) callbacks.onDone();
  };
  window.speechSynthesis.speak(utter);
}
function stopSpeaking(){
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  state.talking = false; updateAvatarClass();
}
function updateAvatarClass(){
  const av = document.getElementById('teacherAvatar');
  if (av) av.classList.toggle('talking', state.talking);
}
function scrollChatToBottom(){
  const cw = document.querySelector('.chat-window');
  if (cw) cw.scrollTop = cw.scrollHeight;
}

function startListening(onResult){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR){ alert('Voice input is not supported in this browser. Try Chrome or Edge.'); return; }
  const recog = new SR();
  recog.lang = state.ttsLang === 'hi' ? 'hi-IN' : 'en-IN';
  recog.interimResults = false;
  recog.maxAlternatives = 1;
  recog.onresult = (e)=>{ const text = e.results[0][0].transcript; onResult(text); };
  recog.onerror = ()=>{ state.listening = false; render(); };
  recog.onend = ()=>{ state.listening = false; render(); };
  state.listening = true; render();
  recog.start();
}

function handleImageFile(file){
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const dataUrl = reader.result;
    const base64 = dataUrl.split(',')[1];
    state.pendingImage = { mediaType: file.type, data: base64, previewUrl: dataUrl };
    render();
  };
  reader.readAsDataURL(file);
}

function initials(name){ return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function colorForProfile(id){
  const colors = ["#E8A33D","#4C9F70","#7C5CBF","#C2536B","#3B6EA5"];
  let h=0; for(const c of id) h = (h*31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}

async function callClaude(systemPrompt, userText, image){
  const res = await fetch("/api/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system: systemPrompt, message: userText, image: image || undefined })
  });
  if (!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || 'Request failed');
  }
  const data = await res.json();
  return data.text || "";
}

// Strips markdown, emojis, and stray symbols so text is pure natural spoken sentences -
// used for BOTH what's shown on screen and what's spoken, so the two always match exactly.
function cleanReply(text){
  if (!text) return text;
  return text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/__(.*?)__/g, '$1')
    .replace(/(?<!\w)_(.*?)_(?!\w)/g, '$1')
    .replace(/`{1,3}([^`]*)`{1,3}/g, '$1')
    .replace(/^#{1,6}\s*/gm, '')
    .replace(/^\s*[-*+]\s+/gm, '')
    .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{2190}-\u{21FF}\u{FE0F}\u{200D}]/gu, '')
    .replace(/[#*_~`^|•]/g, '')
    .replace(/\s[-–—]\s/g, ', ')
    .replace(/\n{2,}/g, '. ')
    .replace(/\n/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function tutorSystemPrompt(profile, subject, topic){
  const langLine = state.ttsLang === 'hi'
    ? ' Respond entirely in warm, simple Hindi using Devanagari script (not Roman/Hinglish transliteration). Keep proper nouns, numbers, and technical terms without a common Hindi equivalent in English, but write everything else in Hindi.'
    : '';
  const styleLine = ' Write the way a real teacher would speak out loud in the room, in natural flowing sentences. Do not use any markdown formatting: no asterisks, no hash symbols, no bullet points or numbered lists, no dashes as list markers, no emojis, no backticks. If you want to list a few things, weave them into a sentence with words like "first," "next," and "also" instead of a list. Every word you write may be read aloud by text-to-speech, so it must sound natural when spoken, not like a written document.';
  if (isEarlyYears(profile.grade)){
    return `You are a cheerful, extremely patient preschool teacher talking to a ${profile.grade} child (age 3-5) in India, and to the parent sitting with them, about "${subject}". Use VERY short sentences (5-8 words), simple everyday words, and lots of encouragement ("Well done!", "Great try!"). Include fun sounds, rhymes, or a tiny story where it helps. Suggest one simple hands-on activity the parent can do with the child (e.g. "count 5 spoons together"). Never use paragraphs — use short lines. Keep the whole reply under 80 words. Address the parent briefly if useful, but keep the core message speakable to a small child.${styleLine}${langLine}`;
  }
  return `You are a warm, patient CBSE tutor helping a Class ${profile.grade} student in India understand "${subject}"${topic ? (', specifically the topic "'+topic+'"') : ''}. Match your explanation depth to the NCERT/CBSE syllabus for this grade. Use simple language, short paragraphs, and relatable Indian examples. When the student asks a problem to solve, guide them step by step with questions rather than just giving the final answer immediately, unless they explicitly ask for the answer. Keep replies concise (under 150 words) and encouraging.${styleLine}${langLine}`;
}

async function sendChat(text){
  const profile = activeProfile();
  const img = state.pendingImage;
  if (!profile || !state.activeSubject || (!text.trim() && !img)) return;
  state.chat.push({role:"user", text, image: img ? img.previewUrl : null});
  state.pendingImage = null;
  state.chatLoading = true;
  render();
  try {
    const reply = await callClaude(
      tutorSystemPrompt(profile, state.activeSubject, state.topic),
      text || "Please look at this photo and help me understand it.",
      img ? { mediaType: img.mediaType, data: img.data } : null
    );
    const cleaned = cleanReply(reply) || "Sorry, I couldn't think of a reply. Try asking again!";

    if (shouldAutoSpeak(profile)){
      // Reveal the caption in step with the voice, instead of dumping the whole
      // answer on screen before a single word has been spoken.
      const msg = { role: "assistant", text: "" };
      state.chat.push(msg);
      state.chatLoading = false;
      render();
      speak(cleaned, {
        onWord: (charIndex) => {
          msg.text = cleaned.slice(0, charIndex);
          scrollChatToBottom();
          const bubbleEl = document.querySelector('.msg.assistant:last-child .bubble');
          if (bubbleEl) bubbleEl.textContent = msg.text;
        },
        onDone: () => {
          msg.text = cleaned;
          render();
        }
      });
      return;
    } else {
      state.chat.push({role:"assistant", text: cleaned});
    }
  } catch(e){
    state.chat.push({role:"assistant", text:"Hmm, I couldn't reach the tutor service right now. Please try again."});
  }
  state.chatLoading = false;
  render();
}

async function generateQuiz(){
  const profile = activeProfile();
  if (!profile || !state.activeSubject) return;
  state.quizLoading = true;
  state.quiz = null;
  state.quizAnswers = {};
  state.quizSubmitted = false;
  render();
  const early = isEarlyYears(profile.grade);
  const sys = early
    ? `You generate very simple picture-style quizzes for a preschool child (age 3-5) in India, to be read aloud by a parent. Respond with ONLY valid JSON, no markdown fences, no preamble, matching exactly this schema: {"questions":[{"question":"string","options":["a","b","c","d"],"correct":0,"explanation":"short string"}]}. Rules: question text under 10 words; each option should be very short and include a relevant emoji (e.g. "3 🍎" or "Red 🔴" or "Cat 🐱"); only 3 options per question, not 4; explanations under 12 words and encouraging. Create exactly 4 questions.`
    : `You generate CBSE-aligned multiple choice quizzes for Indian school students. Respond with ONLY valid JSON, no markdown fences, no preamble, matching exactly this schema: {"questions":[{"question":"string","options":["a","b","c","d"],"correct":0,"explanation":"short string"}]}. Create exactly 5 questions.`;
  const user = early
    ? `${profile.grade} child, subject: ${state.activeSubject}${state.topic ? ', topic: '+state.topic : ''}. Create a fun, very easy picture-style quiz appropriate for this age.`
    : `Class ${profile.grade} student, subject: ${state.activeSubject}${state.topic ? ', topic: '+state.topic : ''}. Create 5 CBSE-syllabus-appropriate multiple choice questions at the right difficulty for this grade.`;
  try {
    let raw = await callClaude(sys, user);
    raw = raw.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(raw);
    state.quiz = parsed;
  } catch(e){
    state.quiz = {error: true};
  }
  state.quizLoading = false;
  render();
}

async function submitQuiz(){
  const profile = activeProfile();
  if (!profile || !state.quiz || !state.quiz.questions) return;
  let score = 0;
  state.quiz.questions.forEach((q,i)=>{ if(state.quizAnswers[i]===q.correct) score++; });
  state.quizSubmitted = true;
  const entry = {
    subject: state.activeSubject,
    topic: state.topic || "General",
    score, total: state.quiz.questions.length,
    date: new Date().toISOString().slice(0,10)
  };
  if (!state.progress[profile.id]) state.progress[profile.id] = [];
  state.progress[profile.id].unshift(entry);
  await saveProgressEntry(profile.id, entry);
  render();
}

function el(tag, attrs, children){
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs){
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.setAttribute('style', attrs[k]);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] !== null && attrs[k] !== undefined) e.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c=>{
    if (c === null || c === undefined) return;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

      ])
    ]));
    wrap.appendChild(el('div',{style:'text-align:center;'},[
      el('button', {class:'quiz-start-btn', onclick: generateQuiz}, ['Try another quiz'])
    ]));
  }
  return wrap;
}

function renderProgress(){
  const profile = activeProfile();
  if (!profile) return el('div', {class:'empty-state'}, [el('h2',{},['Welcome!']), el('p',{},['Add your first child on the left to get started.'])]);
  const list = state.progress[profile.id] || [];
  const wrap = el('div', {class:'progress-list'});
  if (list.length===0){
    wrap.appendChild(el('div', {class:'empty-state'}, [el('h2',{},['No quizzes yet']), el('p',{},[profile.name+"'s practice quiz scores will show up here."])]));
    return wrap;
  }
  list.forEach(entry=>{
    const pct = entry.score/entry.total;
    const scoreClass = pct>=0.8 ? 'good' : pct>=0.5 ? 'mid' : 'low';
    wrap.appendChild(el('div', {class:'progress-row'}, [
      el('div', {class:'p-subject-dot', style:`background:${subjColor(entry.subject)}`}),
      el('div', {class:'p-info'}, [
        el('div', {class:'p-topic'}, [entry.subject + (entry.topic && entry.topic!=='General' ? ' · '+entry.topic : '')]),
        el('div', {class:'p-meta'}, [entry.date])
      ]),
      el('div', {class:'p-score '+scoreClass}, [entry.score+'/'+entry.total])
    ]));
  });
  return wrap;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  const sidebarEl = renderSidebar();
  if (state.sidebarOpen) sidebarEl.classList.add('open');
  app.appendChild(sidebarEl);

  const backdrop = el('div', {
    class: 'sidebar-backdrop' + (state.sidebarOpen ? ' open' : ''),
    onclick: ()=>{ state.sidebarOpen = false; render(); }
  });
  app.appendChild(backdrop);

  const main = el('div', {class:'main'});
  const profile = activeProfile();
  const topbar = el('div', {class:'topbar'}, [
    el('div', {style:'display:flex; align-items:center; gap:10px;'}, [
      el('button', {class:'menu-btn', onclick: ()=>{ state.sidebarOpen = !state.sidebarOpen; render(); }}, ['☰']),
      el('h1', {}, [profile ? profile.name+"'s learning space" : 'Welcome to Apna Tutor'])
    ]),
    el('div', {class:'context'}, [profile && state.activeSubject ? (state.activeSubject + (state.topic? ' · '+state.topic : '')) : ''])
  ]);
  main.appendChild(topbar);

  const tabs = el('div', {class:'tabs'});
  [['tutor','Ask Tutor'],['quiz','Practice Quiz'],['progress','Progress']].forEach(([key,label])=>{
    tabs.appendChild(el('div', {class:'tab'+(state.activeTab===key?' active':''), onclick: ()=>{ state.activeTab=key; render(); }}, [label]));
  });
  main.appendChild(tabs);

  const panel = el('div', {class:'panel'});
  if (state.activeTab==='tutor') panel.appendChild(renderChat());
  else if (state.activeTab==='quiz') panel.appendChild(renderQuiz());
  else panel.appendChild(renderProgress());
  main.appendChild(panel);

  app.appendChild(main);
}

loadProfiles();
primeVoices();

// ---- PWA: service worker + install prompt ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  state.canInstall = true;
  render();
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  state.canInstall = false;
  render();
});
function promptInstall(){
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(() => {
    deferredInstallPrompt = null;
    state.canInstall = false;
    render();
  });
}
</script>
